<!DOCTYPE html>
<html>
<head>
    <title>API Endpoint Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 4px; overflow-x: auto; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>SZEBI API Endpoint Test</h1>
    
    <div class="test-section">
        <h2>Test 1: /api/devices</h2>
        <button onclick="testDevices()">Test Devices Endpoint</button>
        <div id="devices-result"></div>
    </div>
    
    <div class="test-section">
        <h2>Test 2: /api/dashboard/summary</h2>
        <button onclick="testDashboard()">Test Dashboard Endpoint</button>
        <div id="dashboard-result"></div>
    </div>
    
    <script>
        async function testDevices() {
            const resultDiv = document.getElementById('devices-result');
            resultDiv.innerHTML = '<p>Loading...</p>';
            
            try {
                const response = await fetch('http://localhost:8080/api/devices');
                const status = response.status;
                const statusText = response.statusText;
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = `
                        <p class="success">✓ Status: ${status} ${statusText}</p>
                        <p>Response:</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    const errorText = await response.text();
                    resultDiv.innerHTML = `
                        <p class="error">✗ Status: ${status} ${statusText}</p>
                        <p>Error Response:</p>
                        <pre>${errorText}</pre>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <p class="error">✗ Network Error</p>
                    <pre>${error.message}</pre>
                `;
            }
        }
        
        async function testDashboard() {
            const resultDiv = document.getElementById('dashboard-result');
            resultDiv.innerHTML = '<p>Loading...</p>';
            
            const url = 'http://localhost:8080/api/dashboard/summary?buildingId=1&range=day';
            
            try {
                const response = await fetch(url);
                const status = response.status;
                const statusText = response.statusText;
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = `
                        <p class="success">✓ Status: ${status} ${statusText}</p>
                        <p>Response:</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    const errorText = await response.text();
                    resultDiv.innerHTML = `
                        <p class="error">✗ Status: ${status} ${statusText}</p>
                        <p>Error Response:</p>
                        <pre>${errorText}</pre>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <p class="error">✗ Network Error</p>
                    <pre>${error.message}</pre>
                `;
            }
        }
    </script>
</body>
</html>
