<!DOCTYPE html>
<html>

<head>
    <title>Dashboard Data Debug</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #f5f5f5;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            margin: 10px 0;
        }

        pre {
            background: white;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
        }

        .good {
            color: green;
            font-weight: bold;
        }

        .bad {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1>Dashboard Data Debug</h1>
    <button onclick="checkData()">Sprawdź dane z API</button>
    <div id="result"></div>

    <script>
        async function checkData() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Ładowanie...</p>';

            const url = 'http://localhost:8080/api/dashboard/summary?buildingId=1&range=day';

            try {
                const response = await fetch(url);
                const data = await response.json();

                let html = '<h2>Status: ' + response.status + ' ' + response.statusText + '</h2>';

                // Analiza energy data
                html += '<h3>Energy Data (pierwsze 3 punkty):</h3>';
                if (data.energy && data.energy.data) {
                    data.energy.data.slice(0, 3).forEach(point => {
                        let realStatus = point.rzeczywiste > 0 ? '<span class="good">✓ OK</span>' : '<span class="bad">✗ ZERO</span>';
                        let forecastStatus = point.prognozowane > 0 ? '<span class="good">✓ OK</span>' : '<span class="bad">✗ ZERO</span>';
                        html += `<p>${point.hour || point.day}: Rzeczywiste=${point.rzeczywiste} ${realStatus}, Prognozowane=${point.prognozowane} ${forecastStatus}</p>`;
                    });
                }

                // Analiza OZE status
                html += '<h3>OZE Status:</h3>';
                html += `<p>Production: ${data.ozeStatus?.production || 0} W ${data.ozeStatus?.production > 0 ? '<span class="good">✓</span>' : '<span class="bad">✗</span>'}</p>`;
                html += `<p>Grid: ${data.ozeStatus?.grid || 0} W ${data.ozeStatus?.grid > 0 ? '<span class="good">✓</span>' : '<span class="bad">✗ PROBLEM</span>'}</p>`;

                // Statystyki
                html += '<h3>Statystyki:</h3>';
                html += `<p>Total Consumption: ${data.totalConsumption} kWh</p>`;
                html += `<p>Average Consumption: ${data.averageConsumption} kWh</p>`;
                html += `<p>Total Forecast: ${data.energy?.totalForecast || 0} kWh ${data.energy?.totalForecast > 0 ? '<span class="good">✓</span>' : '<span class="bad">✗ BRAK PROGNOZ</span>'}</p>`;
                html += `<p>Anomalies: ${data.anomaliesCount}</p>`;

                // Pełny JSON
                html += '<h3>Pełna odpowiedź JSON:</h3>';
                html += '<pre>' + JSON.stringify(data, null, 2) + '</pre>';

                resultDiv.innerHTML = html;
            } catch (error) {
                resultDiv.innerHTML = '<p style="color: red;">Błąd: ' + error.message + '</p>';
            }
        }
    </script>
</body>

</html>
