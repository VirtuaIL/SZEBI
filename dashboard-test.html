<!DOCTYPE html>
<html>

<head>
    <title>Dashboard Endpoints Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }

        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            max-height: 300px;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }
    </style>
</head>

<body>
    <h1>Dashboard Endpoints Test</h1>

    <div class="test-section">
        <h2>Test 1: /api/dashboard/summary</h2>
        <button onclick="testEndpoint('summary', '/api/dashboard/summary?buildingId=1&range=day')">Test Summary</button>
        <div id="summary-result"></div>
    </div>

    <div class="test-section">
        <h2>Test 2: /api/dashboard/energy</h2>
        <button onclick="testEndpoint('energy', '/api/dashboard/energy?buildingId=1&range=day')">Test Energy</button>
        <div id="energy-result"></div>
    </div>

    <div class="test-section">
        <h2>Test 3: /api/dashboard/oze-status</h2>
        <button onclick="testEndpoint('oze', '/api/dashboard/oze-status?buildingId=1')">Test OZE Status</button>
        <div id="oze-result"></div>
    </div>

    <div class="test-section">
        <h2>Test 4: /api/dashboard/anomalies</h2>
        <button onclick="testEndpoint('anomalies', '/api/dashboard/anomalies?buildingId=1&range=day')">Test
            Anomalies</button>
        <div id="anomalies-result"></div>
    </div>

    <script>
        async function testEndpoint(name, path) {
            const resultDiv = document.getElementById(name + '-result');
            resultDiv.innerHTML = '<p>Loading...</p>';

            const url = 'http://localhost:8080' + path;

            try {
                const response = await fetch(url);
                const status = response.status;
                const statusText = response.statusText;

                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = `
                        <p class="success">✓ Status: ${status} ${statusText}</p>
                        <p>URL: ${url}</p>
                        <p>Response:</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    const errorText = await response.text();
                    resultDiv.innerHTML = `
                        <p class="error">✗ Status: ${status} ${statusText}</p>
                        <p>URL: ${url}</p>
                        <p>Error Response:</p>
                        <pre>${errorText}</pre>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <p class="error">✗ Network Error</p>
                    <p>URL: ${url}</p>
                    <pre>${error.message}</pre>
                `;
            }
        }
    </script>
</body>

</html>
