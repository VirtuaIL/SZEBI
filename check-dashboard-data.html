<!DOCTYPE html>
<html>

<head>
    <title>Dashboard Data Check</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #f5f5f5;
        }

        .section {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 4px;
        }

        pre {
            background: #f5f5f5;
            padding: 10px;
            overflow-x: auto;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>Dashboard Data Check</h1>
    <button onclick="checkData()">Sprawdź dane z API</button>
    <div id="result"></div>

    <script>
        async function checkData() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Ładowanie...</p>';

            const url = 'http://localhost:8080/api/dashboard/summary?buildingId=1&range=day';

            try {
                const response = await fetch(url);
                const data = await response.json();

                resultDiv.innerHTML = `
                    <div class="section">
                        <h2>Status: ${response.status} ${response.statusText}</h2>
                        <h3>Pełna odpowiedź JSON:</h3>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                    
                    <div class="section">
                        <h3>Analiza danych:</h3>
                        <p><strong>Energy data:</strong> ${data.energy?.data?.length || 0} punktów danych</p>
                        <p><strong>Total consumption:</strong> ${data.totalConsumption || 0}</p>
                        <p><strong>Average consumption:</strong> ${data.averageConsumption || 0}</p>
                        <p><strong>OZE production:</strong> ${data.ozeStatus?.production || 0} W</p>
                        <p><strong>Grid consumption:</strong> ${data.ozeStatus?.grid || 0} W</p>
                        <p><strong>Anomalies count:</strong> ${data.anomaliesCount || 0}</p>
                        
                        <h4>Przykładowe dane energy (pierwsze 3):</h4>
                        <pre>${JSON.stringify(data.energy?.data?.slice(0, 3), null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="section" style="color: red;">
                        <h2>Błąd:</h2>
                        <pre>${error.message}</pre>
                    </div>
                `;
            }
        }
    </script>
</body>

</html>
